<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình xem VNC</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #111;
            color: #fff;
            font-family: sans-serif;
        }

        .frame {
            width: 100vw;
            height: 100vh;
            border: 0;
            display: block;
        }

        .status {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body data-vnc-password="{{ vnc_password | e }}">
    <div class="status">VNC đang hoạt động. Nếu không có heartbeat từ trang này, hệ thống sẽ tự động dừng sau {{ vnc_idle_timeout_seconds }} giây.</div>
    <iframe class="frame" src="{{ novnc_url }}"></iframe>

    <script>
        const vncPassword = document.body.dataset.vncPassword || '';

        async function sendHeartbeat() {
            try {
                const heartbeatUrl = '/heartbeat?password=' + encodeURIComponent(vncPassword);
                await fetch(heartbeatUrl, {
                    method: 'POST',
                    headers: { 'X-VNC-Password': vncPassword },
                    cache: 'no-store',
                    keepalive: true,
                });
            } catch (error) {
                console.error('Heartbeat failed:', error);
            }
        }

        sendHeartbeat();
        const heartbeatTimer = setInterval(sendHeartbeat, 2000);

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                sendHeartbeat();
            }
        });

        window.addEventListener('focus', () => {
            sendHeartbeat();
        });

        window.addEventListener('beforeunload', () => {
            clearInterval(heartbeatTimer);
        });
    </script>
</body>
</html>
