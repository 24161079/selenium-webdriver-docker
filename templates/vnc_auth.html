<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xac thuc VNC</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #0f172a;
            color: #e2e8f0;
            font-family: "Be Vietnam Pro", "Noto Sans", sans-serif;
            padding: 24px;
        }

        .card {
            width: min(420px, 100%);
            background: #111b2e;
            border: 1px solid #2b3f5f;
            border-radius: 14px;
            padding: 20px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        p {
            margin: 0 0 12px;
            color: #b8c7dd;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #41597f;
            background: #0b1423;
            color: #fff;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            border: 0;
            border-radius: 10px;
            padding: 10px 12px;
            font-weight: 700;
            background: #0b7285;
            color: #fff;
            cursor: pointer;
        }

        .msg {
            margin-top: 10px;
            color: #fca5a5;
            min-height: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <form class="card" method="GET" action="/vnc">
        <h1>Dang nhap VNC</h1>
        <p>Nhap mat khau phien VNC de tiep tuc.</p>
        <input type="password" name="password" placeholder="Mat khau VNC" required>
        <button type="submit">Mo VNC</button>
        <div class="msg">{{ message or "" }}</div>
    </form>
</body>
</html>
