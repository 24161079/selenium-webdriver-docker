<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng dụng hỗ trợ giáo viên nhập điểm</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-top: #f8fafc;
            --bg-bottom: #e4edf8;
            --card: #ffffff;
            --ink: #0f172a;
            --muted: #475569;
            --brand: #0b7285;
            --brand-strong: #0f4c5c;
            --outline: #d9e3ee;
            --success: #166534;
            --error: #b91c1c;
            --warn: #92400e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Be Vietnam Pro", "Noto Sans", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 14%, #d6ecff 0 14%, transparent 15%),
                radial-gradient(circle at 88% 18%, #d6f7eb 0 12%, transparent 13%),
                linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
        }

        .shell {
            width: min(760px, 100%);
            border: 1px solid var(--outline);
            border-radius: 22px;
            padding: 28px 28px 20px;
            background: linear-gradient(180deg, #ffffff 0%, #f9fcff 100%);
            box-shadow: 0 20px 60px rgba(11, 76, 92, 0.18);
        }

        .badge {
            display: inline-block;
            margin-bottom: 12px;
            padding: 6px 12px;
            border-radius: 999px;
            background: #dff4ff;
            color: #0a4f7a;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(30px, 4vw, 42px);
            line-height: 1.15;
            letter-spacing: -0.8px;
        }

        .subtitle {
            margin: 10px 0 6px;
            color: var(--muted);
            font-size: 17px;
        }

        .author {
            margin: 0 0 20px;
            color: #334155;
            font-size: 14px;
            font-weight: 600;
        }

        .support-note {
            margin: 0 0 18px;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid #c7e3ea;
            background: linear-gradient(90deg, #ecfbff 0%, #f3fdf8 100%);
            color: #0f4c5c;
            font-size: 14px;
            font-weight: 600;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .security {
            margin-top: 14px;
            padding: 12px;
            border-radius: 12px;
            background: #fff7e6;
            border: 1px solid #f7d9a8;
            color: #6b3f00;
            font-size: 14px;
        }

        .security strong {
            color: #4b2900;
        }

        .cancel-row {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        #passwordInput {
            flex: 1 1 220px;
            border: 1px solid #e7be70;
            border-radius: 10px;
            padding: 9px 10px;
            font: inherit;
            min-width: 190px;
        }

        #passwordInput.error {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.16);
        }

        #passwordInput.success {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.16);
        }

        .shake {
            animation: shake 0.3s linear;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            50% { transform: translateX(4px); }
            75% { transform: translateX(-3px); }
            100% { transform: translateX(0); }
        }

        #cancelBtn {
            background: #9f1239;
            color: #fff;
        }

        button {
            border: 0;
            border-radius: 12px;
            padding: 11px 18px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease, background-color 0.2s ease;
        }

        #runBtn {
            background: var(--brand);
            color: #ffffff;
        }

        #reopenBtn {
            background: #e6f4f7;
            color: var(--brand-strong);
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        #result {
            margin-top: 16px;
            padding: 12px 14px;
            border-radius: 12px;
            background: #f1f7fd;
            border: 1px solid #d8e8f5;
            color: var(--success);
            font-weight: 600;
            min-height: 48px;
            display: flex;
            align-items: center;
        }

        .notice {
            margin-top: 10px;
            border-radius: 10px;
            padding: 10px 12px;
            font-weight: 600;
            border: 1px solid transparent;
            display: none;
        }

        .notice.show {
            display: block;
        }

        .notice.error {
            background: #fef2f2;
            color: var(--error);
            border-color: #fecaca;
        }

        .notice.success {
            background: #f0fdf4;
            color: var(--success);
            border-color: #bbf7d0;
        }

        .notice.warn {
            background: #fff7ed;
            color: var(--warn);
            border-color: #fed7aa;
        }

        @media (max-width: 560px) {
            .shell {
                padding: 20px 18px 16px;
                border-radius: 16px;
            }

            .subtitle {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <span class="badge">Trợ lý giáo viên</span>
        <h1>Ứng dụng hỗ trợ giáo viên nhập điểm</h1>
        <p class="subtitle">Nhấn nút bên dưới để bắt đầu chương trình tự động và theo dõi qua trang VNC.</p>
        <p class="author">Tác giả: Con bà Trâm</p>
        <p class="support-note">Nếu có vấn đề gì, xin hãy liên hệ bà Trâm để hỗ trợ.</p>

        <div class="actions">
            <button id="runBtn">Bắt đầu</button>
            <button id="reopenBtn" disabled>Mở lại VNC</button>
        </div>
        <div class="security" id="securityBox">
            <div>Mật khẩu phiên VNC: <strong id="vncPassword">Chưa có</strong></div>
            <div class="cancel-row">
                <input id="passwordInput" type="password" placeholder="Nhập hoặc dán mật khẩu VNC" />
                <button id="cancelBtn" disabled>Hủy VNC hiện tại</button>
            </div>
            <div id="securityNotice" class="notice"></div>
        </div>
        <div id="result">Sẵn sàng khởi động hệ thống.</div>
    </main>

    <script>
        const runBtn = document.getElementById('runBtn');
        const reopenBtn = document.getElementById('reopenBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const vncPasswordEl = document.getElementById('vncPassword');
        const passwordInput = document.getElementById('passwordInput');
        const securityNotice = document.getElementById('securityNotice');
        const result = document.getElementById('result');
        let currentNovncUrl = '';
        let vncWindow = null;
        let currentVncPassword = '';
        let isRunning = false;
        let isStopping = false;
        const PASSWORD_STORAGE_KEY = 'currentVncPassword';

        function setCurrentPassword(value) {
            currentVncPassword = (value || '').trim();
            vncPasswordEl.textContent = currentVncPassword || 'Chưa có';
            passwordInput.value = currentVncPassword;

            if (currentVncPassword) {
                localStorage.setItem(PASSWORD_STORAGE_KEY, currentVncPassword);
            } else {
                localStorage.removeItem(PASSWORD_STORAGE_KEY);
            }
        }

        function showSecurityNotice(message, type = 'warn') {
            securityNotice.className = 'notice show ' + type;
            securityNotice.textContent = message;
        }

        function clearSecurityNotice() {
            securityNotice.className = 'notice';
            securityNotice.textContent = '';
        }

        function markPasswordInput(type) {
            passwordInput.classList.remove('error', 'success', 'shake');
            if (type === 'error') {
                passwordInput.classList.add('error', 'shake');
            }
            if (type === 'success') {
                passwordInput.classList.add('success');
            }
        }

        function setRunningState(running, stopping = false) {
            isRunning = Boolean(running);
            isStopping = Boolean(stopping);

            runBtn.disabled = isRunning || isStopping;
            reopenBtn.disabled = !isRunning || !currentNovncUrl || isStopping;
            cancelBtn.disabled = !isRunning || !currentVncPassword || isStopping;
        }

        function openVncWindow() {
            if (!currentNovncUrl) {
                return;
            }

            if (vncWindow && !vncWindow.closed) {
                vncWindow.focus();
                return;
            }

            const password = prompt('Nhập mật khẩu VNC để mở phiên:', currentVncPassword || '');
            if (!password) {
                return;
            }

            setCurrentPassword(password);

            vncWindow = window.open(currentNovncUrl + '?password=' + encodeURIComponent(password), '_blank');
        }

        async function refreshStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();

                if (data.novnc_url) {
                    currentNovncUrl = data.novnc_url;
                }

                if (!data.running) {
                    setCurrentPassword('');
                }

                setRunningState(Boolean(data.running), Boolean(data.stopping));

                if (data.stopping) {
                    result.textContent = 'Hệ thống đang dừng phiên trước, vui lòng chờ hoàn tất rồi mới bấm Bắt đầu.';
                } else if (data.running) {
                    result.textContent = 'Chương trình đang chạy. Nếu không có heartbeat từ trang VNC, hệ thống sẽ tự dừng sau {{ vnc_idle_timeout_seconds }} giây.';
                }
            } catch (error) {
                console.error('Status check failed:', error);
            }
        }

        runBtn.addEventListener('click', async () => {
            result.textContent = 'Đang gửi yêu cầu...';

            try {
                const response = await fetch('/run', { method: 'POST' });
                const data = await response.json();

                if (!response.ok) {
                    currentNovncUrl = data.novnc_url || currentNovncUrl;
                    const stoppingState = data.status === 'stopping';
                    const runningState = stoppingState || data.status === 'busy' || Boolean(data.running);
                    setRunningState(runningState, stoppingState);
                    result.textContent = 'Lỗi: ' + (data.message || 'Không thể bắt đầu Chương trình');
                    return;
                }

                result.textContent = 'Ứng dụng hỗ trợ giáo viên nhập điểm. Số Chương trình đang chạy: ' + data.active_jobs;
                currentNovncUrl = data.novnc_url || '';
                setCurrentPassword(data.vnc_password || '');
                clearSecurityNotice();
                markPasswordInput('success');
                setRunningState(true);

                openVncWindow();
            } catch (error) {
                result.textContent = 'Lỗi kết nối: ' + error.message;
            }
        });

        reopenBtn.addEventListener('click', () => {
            openVncWindow();
        });

        cancelBtn.addEventListener('click', async () => {
            const password = (passwordInput.value || currentVncPassword || '').trim();
            if (!password) {
                showSecurityNotice('Vui lòng nhập mật khẩu VNC trước khi hủy phiên.', 'warn');
                markPasswordInput('error');
                return;
            }

            setCurrentPassword(password);
            setRunningState(true, true);

            try {
                const response = await fetch('/vnc/cancel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password }),
                });
                const data = await response.json();

                if (!response.ok && data.status === 'unauthorized') {
                    showSecurityNotice('Mật khẩu VNC không đúng. Vui lòng kiểm tra lại.', 'error');
                    markPasswordInput('error');
                    result.textContent = data.message || 'Mật khẩu VNC không đúng.';
                    setRunningState(true, false);
                    return;
                }

                if (!response.ok) {
                    showSecurityNotice(data.message || 'Không thể hủy phiên VNC hiện tại.', 'error');
                    markPasswordInput('error');
                    result.textContent = data.message || 'Không thể hủy phiên VNC hiện tại.';
                    setRunningState(true, false);
                    return;
                }

                showSecurityNotice(data.message || 'Đã hủy phiên VNC hiện tại.', 'success');
                markPasswordInput('success');
                result.textContent = data.message || 'Đã hủy phiên VNC hiện tại.';
                await refreshStatus();
            } catch (error) {
                showSecurityNotice('Lỗi kết nối khi gửi yêu cầu hủy VNC.', 'error');
                markPasswordInput('error');
                result.textContent = 'Lỗi kết nối: ' + error.message;
                setRunningState(true, false);
            }
        });

        passwordInput.addEventListener('input', () => {
            setCurrentPassword(passwordInput.value);
            clearSecurityNotice();
            passwordInput.classList.remove('error', 'success', 'shake');
            setRunningState(isRunning, isStopping);
        });

        setCurrentPassword(localStorage.getItem(PASSWORD_STORAGE_KEY) || '');

        setInterval(refreshStatus, 3000);
        refreshStatus();
    </script>
</body>
</html>
